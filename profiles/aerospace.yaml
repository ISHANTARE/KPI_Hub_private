standards_catalog:
  "DO-178C":
    "Level A": "Level A: Catastrophic. Verification requires full structural coverage, statement, decision, and MC/DC (Modified Condition/Decision Coverage)."
    "Level B": "Level B: Hazardous. Verification requires statement and decision coverage."
    "Level C": "Level C: Major. Verification requires statement coverage."
    "Level D": "Level D: Minor. Run normal system-level test checks."
  "DO-254":
    "DAL A": "DAL A: Highest hardware assurance level. Requires independent path verification and safety assessment."
    "DAL B": "DAL B: Medium-high hardware assurance. Strict design review and validation protocols."

name: KPI Hub CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Syntax & Type Checks
      run: |
        python -m py_compile web_app.py lib/*.py pages/*.py

    - name: Run Bootstrap Data Test
      run: |
        python scripts/bootstrap.py

    - name: Run Pytest Test Suite with Coverage
      run: |
        pytest tests/ --cov=lib --cov-report=term-missing

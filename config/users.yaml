# =============================================================================
# config/users.yaml
# KPI Hub User Registry
# -----------------------------------------------------------------------------
# Passwords are stored as bcrypt hashes (cost factor 12).
# To add a new user, generate a hash via:
#   python -c "import bcrypt; print(bcrypt.hashpw(b'yourpassword', bcrypt.gensalt(12)).decode())"
# then add the entry below.
#
# Roles:
#   Manager  — full access to all projects, budgets, system integrations, data upload
#   Viewer   — read-only access scoped to assigned projects only; no budget data
# =============================================================================

users:
  admin:
    display_name: "KPI Hub Admin"
    email: "admin@kpihub.local"
    role: Manager
    # Password: admin123
    password_hash: "$2b$12$RTVe38hFBiyYyfoSlJWY/elHteF0DjHRGlTJrx19SKe7SmSJ5IWGu"

  viewer:
    display_name: "Engineering Viewer"
    email: "viewer@kpihub.local"
    role: Viewer
    # Scoped to these project IDs only. Leave empty list [] to derive from org_mapping.csv.
    projects:
      - P001
      - P002
      - P003
    # Password: viewer123
    password_hash: "$2b$12$B6P7/7c1rPM10IEwCb9EyeFSD.4cxRFx0Yg9ulMZMO1bBMUv7pq3G"
